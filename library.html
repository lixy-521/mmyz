<!-- 
  文件名称：library.html
  功能描述：图书管理系统内部页 - 包含借阅查询、书籍状态、馆藏统计与档案检索
  主要脚本：
    - js/auth.js (权限验证与登录态展示)
    - js/library.js (图书馆业务搜索与 SVG 图纸渲染)
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 · 狼堡一中</title>
    <link rel="stylesheet" href="css/campus.css" />
    <link rel="stylesheet" href="css/mobile.css" />
</head>

<body>
    <nav class="campus-nav">
        <div class="campus-nav-inner">
            <a class="campus-nav-logo" href="index.html">
                <img src="assets/logo.webp" onerror="this.style.display='none'" alt="校徽" />
                <div>
                    <div class="school-name">狼堡一中</div>
                    <div class="school-sub">图书管理系统</div>
                </div>
            </a>
            <div class="campus-nav-links"></div>
            <div id="nav-user-area"></div>
            <a class="nav-home-back" href="index.html">← 首页</a>
            <button class="nav-hamburger" id="nav-hamburger"
                aria-label="菜单"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="sys-layout">
        <div class="sys-sidebar">
            <div class="sys-sidebar-header">
                <div class="sys-sidebar-title">📚 图书管理系统</div>
                <div class="sys-sidebar-user">lib_admin</div>
            </div>
            <div class="sys-sidebar-nav">
                <div class="sys-sidebar-item active" data-section="borrow">
                    <span class="sys-sidebar-icon">👤</span>借阅人查询
                </div>
                <div class="sys-sidebar-item" data-section="book">
                    <span class="sys-sidebar-icon">📖</span>书籍状态查询
                </div>
                <div class="sys-sidebar-item" data-section="stats">
                    <span class="sys-sidebar-icon">📊</span>馆藏统计
                </div>
                <div class="sys-sidebar-item" data-section="archive">
                    <span class="sys-sidebar-icon">🗂</span>馆藏档案
                </div>
            </div>
        </div>

        <div class="sys-main">
            <!-- 借阅人查询 -->
            <div class="sys-section active" id="sec-borrow">
                <div class="sys-main-header">
                    <div class="sys-main-title">👤 借阅人查询</div>
                    <span style="font-size:12px;color:#6b7f93">按学生姓名查询借阅记录</span>
                </div>
                <div class="campus-search-bar">
                    <input class="campus-input" type="text" id="borrower-search-input" placeholder="输入学生姓名…" />
                    <button class="campus-btn campus-btn-primary" id="borrower-search-btn">查 询</button>
                </div>
                <div id="borrower-result"></div>
            </div>

            <!-- 书籍状态查询 -->
            <div class="sys-section" id="sec-book">
                <div class="sys-main-header">
                    <div class="sys-main-title">📖 书籍状态查询</div>
                    <span style="font-size:12px;color:#6b7f93">按书名查询当前状态及借阅历史</span>
                </div>
                <div class="campus-search-bar">
                    <input class="campus-input" type="text" id="book-search-input" placeholder="输入书名…" />
                    <button class="campus-btn campus-btn-primary" id="book-search-btn">查 询</button>
                </div>
                <div id="book-result"></div>
            </div>

            <!-- 馆藏统计 -->
            <div class="sys-section" id="sec-stats">
                <div class="sys-main-header">
                    <div class="sys-main-title">📊 馆藏统计</div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px">
                    <div class="campus-card mb-0">
                        <div class="campus-card-body text-center">
                            <div style="font-size:32px;color:#1a3a5c;font-weight:700">3,842</div>
                            <div style="font-size:13px;color:#6b7f93;margin-top:4px">馆藏总册数</div>
                        </div>
                    </div>
                    <div class="campus-card mb-0">
                        <div class="campus-card-body text-center">
                            <div style="font-size:32px;color:#c8962e;font-weight:700">127</div>
                            <div style="font-size:13px;color:#6b7f93;margin-top:4px">当前借出册数</div>
                        </div>
                    </div>
                    <div class="campus-card mb-0">
                        <div class="campus-card-body text-center">
                            <div style="font-size:32px;color:#c0392b;font-weight:700">8</div>
                            <div style="font-size:13px;color:#6b7f93;margin-top:4px">逾期未还册数</div>
                        </div>
                    </div>
                    <div class="campus-card mb-0">
                        <div class="campus-card-body text-center">
                            <div style="font-size:32px;color:#1e7e4a;font-weight:700">243</div>
                            <div style="font-size:13px;color:#6b7f93;margin-top:4px">本月借阅人次</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 馆藏档案 -->
            <div class="sys-section" id="sec-archive">
                <div class="sys-main-header">
                    <div class="sys-main-title">🗂 馆藏档案查询</div>
                    <span style="font-size:12px;color:#6b7f93">历史档案、图纸及特藏资料（编号检索）</span>
                </div>
                <div class="campus-search-bar">
                    <input class="campus-input" type="text" id="archive-search-input" placeholder="输入档案编号" />
                    <button class="campus-btn campus-btn-primary" id="archive-search-btn">检 索</button>
                </div>
                <div id="archive-result"></div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/library.js"></script>
    <script>
        document.querySelectorAll(".sys-sidebar-item").forEach(item => {
            item.addEventListener("click", function () {
                document.querySelectorAll(".sys-sidebar-item").forEach(i => i.classList.remove("active"));
                document.querySelectorAll(".sys-section").forEach(s => s.classList.remove("active"));
                this.classList.add("active");
                document.getElementById("sec-" + this.dataset.section)?.classList.add("active");
            });
        });
    </script>
    <script src="js/nav.js"></script>
</body>

</html>
