<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>结局 · 无法挽回</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .ending-wrap {
            max-width: 600px;
            width: 100%;
            text-align: center
        }

        .ending-tag {
            display: inline-block;
            padding: 4px 14px;
            border: 1px solid #444;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .ending-title {
            font-size: 13px;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .ending-text p {
            font-size: 16px;
            line-height: 2.2;
            color: #ccc;
            font-weight: 300;
            opacity: 0;
            animation: fadeInLine 0.8s ease forwards;
            margin-bottom: 4px;
        }

        .ending-text p:nth-child(1) {
            animation-delay: 0.5s
        }

        .ending-text p:nth-child(2) {
            animation-delay: 1.4s
        }

        .ending-text p:nth-child(3) {
            animation-delay: 2.3s
        }

        .ending-text p:nth-child(4) {
            animation-delay: 3.2s
        }

        .ending-text p:nth-child(5) {
            animation-delay: 4.2s;
            color: #888
        }

        .ending-text .mono {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #444;
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 10px 16px;
            border-radius: 4px;
            display: inline-block;
            margin: 8px 0;
            animation-delay: 3.9s !important;
        }

        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .restart-btn {
            display: inline-block;
            margin-top: 56px;
            padding: 10px 28px;
            border: 1px solid #333;
            border-radius: 4px;
            color: #555;
            font-size: 13px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            opacity: 0;
            animation: fadeInLine 0.8s ease forwards;
            animation-delay: 5.5s;
        }

        .restart-btn:hover {
            border-color: #666;
            color: #999
        }
    </style>
</head>

<body>
    <div class="ending-wrap">
        <div class="ending-tag">E N D I N G &nbsp; 0</div>
        <div class="ending-title">无法挽回</div>
        <div class="ending-text">
            <p>你在系统里按下了终止，或者随手输入了什么。</p>
            <p>第二天清晨，你鼓起勇气去了旧实验楼地下室。</p>
            <p>仪器上，两具身体安静地躺着。<br />心率监测器，归零。</p>
            <p class="mono">实验非正常中止，数据损毁。</p>
            <p>也许，那个晚上，你本可以做出不同的选择。</p>
        </div>
        <a class="restart-btn" href="index.html">重新开始</a>
    </div>
</body>

</html>
