<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>结局一 · 部分的救赎</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #fef9e7;
            color: #3a2a10;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景暖光装饰 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 150, 46, 0.12), transparent);
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(200, 150, 46, 0.08), transparent);
            bottom: -80px;
            left: -80px;
            pointer-events: none;
        }

        .ending-wrap {
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1
        }

        .hospital-icon {
            font-size: 56px;
            margin-bottom: 20px;
            animation: iconFadeIn 1s ease forwards;
            opacity: 0;
            animation-delay: 0.3s;
        }

        @keyframes iconFadeIn {
            from {
                opacity: 0;
                transform: scale(0.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .ending-tag {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(200, 150, 46, 0.15);
            border: 1px solid rgba(200, 150, 46, 0.4);
            border-radius: 20px;
            font-size: 12px;
            color: #a07820;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }

        .ending-title {
            font-size: 22px;
            font-weight: 500;
            color: #2a1a08;
            letter-spacing: 2px;
            margin-bottom: 36px
        }

        .ending-text p {
            font-size: 15px;
            line-height: 2.2;
            color: #5a4020;
            font-weight: 300;
            opacity: 0;
            animation: fadeInLine 0.8s ease forwards;
            margin-bottom: 6px;
        }

        .ending-text p:nth-child(1) {
            animation-delay: 0.8s
        }

        .ending-text p:nth-child(2) {
            animation-delay: 1.8s
        }

        .ending-text p:nth-child(3) {
            animation-delay: 2.8s
        }

        .ending-text p:nth-child(4) {
            animation-delay: 3.8s
        }

        .ending-text p:nth-child(5) {
            animation-delay: 4.8s
        }

        .ending-text .name {
            color: #c8962e;
            font-weight: 500
        }

        .ending-text .italic {
            font-style: italic;
            color: #8a6030
        }

        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .restart-btn {
            display: inline-block;
            margin-top: 48px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #c8962e, #dba940);
            border-radius: 4px;
            color: white;
            font-size: 13px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            opacity: 0;
            animation: fadeInLine 0.8s ease forwards;
            animation-delay: 6.2s;
            box-shadow: 0 4px 16px rgba(200, 150, 46, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(200, 150, 46, 0.4)
        }
    </style>
</head>

<body>
    <div class="ending-wrap">
        <div class="hospital-icon">🏥</div>
        <div class="ending-tag">E N D I N G &nbsp; 1</div>
        <div class="ending-title">部分的救赎</div>
        <div class="ending-text">
            <p>仪器缓缓停机。待机模式稳定地保住了两人的生命体征。</p>
            <p>你报警后，警察在天亮前赶到了旧实验楼地下室。<br />经过救治，<span class="name">刘天清</span>和<span class="name">林小雨</span>都活了下来。</p>
            <p><span class="name">参数二</span>是系统档案里原本就有的指令。<br />它被执行时，设备平稳地进入待机——没有任何异常信号，没有警报。<br /><span class="name">董新飞</span>家里的旁路连接静悄悄地。他在第二天早上，被警察堵在了家门口。</p>
            <p>董新飞和王校长被带走调查。格致计划，正式曝光。</p>
            <p>但刘天清醒来后，对某段记忆始终空白。<br />那个叫做 <span class="name">牟通雪</span> 的名字，他怎么也想不起来了。</p>
            <p class="italic">也许，这就是待机的代价。<br />被借走的，不只是时间。</p>
            <p>或许，<span class="name">逆向</span>想一下，还有更好的方法？</p>
        </div>
        <a class="restart-btn" href="../index.html" onclick="sessionStorage.setItem('lbyz_intro_seen','1')">重新开始</a>
    </div>
</body>

</html>
